<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ticket_Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="color:rgb(87, 0, 116) ;">
    <div class="logo_tagline">
    <img src="flight.png" alt="Flight illustration" width="250px">
    <p id="tagline"><i><b>Making travel simple and seamless</b></i></p>
</div>

<a href="index.html"><img id="brand" src="brand.png" width="110px"></a>

<form>

    <div class="options">
    <label>
        <span id="oneway">
        <input type="radio" name="input_type"><b>One Way</b>
        </span>
    </label>

        <label>
            <span id="roundtrip">
            <input type="radio" name="input_type"><b>Round Trip</b>
            </span>
        </label>
        
        <label>
            <span id="multicity">
            <a id="multi" href="coming_soon.html"><input type="radio" name="input_type"><b>Multi City</b></a> 
            </span>
        </label>
</div>

<div class="booking">

    <div class="bookinginfo" id="from">
        <p style="padding: 3px;">From</p>
        <label>
            <input id="inp1" type="text" placeholder="Mumbai" required;>          
        </label>
    </div>

    <div class="bookinginfo" id="to">
        <p style="padding: 3px;">To</p>
         <label>
            <input id="inp2" type="text" placeholder="Delhi" required;>          
        </label>
    </div>

    <div class="bookinginfo" id="departure">
        <p style="padding: 3px;">Departure</p>
         <label>
            <input id="inp3" type="date">          
        </label>
    </div>

    <div class="bookinginfo" id="ret">
        <p style="padding: 3px;">Return</p>
        <label>
            <input id="inp4" type="date">          
        </label>
        
    </div>

    <div class="bookinginfo" id="travellers">
        <p style="padding: 3px;">Travellers</p>
        
        <label>
            <span id="addpass">
                <p style="padding: 15px;"><b>Add   +</b></p>
                <p id ="passcount" style="font-size: 12px; margin-top: 5px;">Total Passengers:0</p>
            </span>
        </label>
        
        <div id="popup">
            <div id="info">
            <input id="passdetail" type="text" placeholder="Hamza Ali Mazari">
            <button id="inc">Add</button>
            <button id="done">Done</button>
            </div>
        </div>
    </div>

</div>
<div id="submit_button">
    <button id="submit" type="submit">Search Flights</button>
</div>

</form>

<div id="showcase">

    <span >
    <img class="p" id="p1" src="plane1.jpg" alt="Picture of a plane">
    <p>Australia</p>
    </span>

     <span >
    <img  class="p" id="p2" src="plane2.jpg" alt="Picture of a plane">
    <p>Brazil</p>
    </span>

     <span >
    <img class="p" id="p3" src="plane3.jpg" alt="Picture of a plane">
    <p>Canada</p>
    </span>

    <span >
    <img class="p" id="p4" src="plane4.jpg" alt="Picture of a plane">
    <p>Denmark</p>
    </span>

    <span >
    <img class="p" id="p5" src="plane5.jpg" alt="Picture of a plane">
    <p>Egypt</p>
    </span>

    <span >
    <img class="p" id="p6" src="plane6.jpg" alt="Picture of a plane">
    <p>France</p>
    </span>

    <span >
    <img class="p" id="p7" src="plane7.jpg" alt="Picture of a plane">
    <p>Greece</p>
    </span>

    <span >
    <img class="p" id="p8" src="plane8.jpg" alt="Picture of a plane">
    <p>Japan</p>
    </span>
    
</div>

    <script src="script.js"></script>
</body>
</html>
